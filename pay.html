<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Haya · Demande de paiement</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --nuit: #0D0D2B;
      --orange: #F97316;
      --vert: #1D9E75;
      --rouge: #E24B4A;
      --fond: #F5F4FF;
      --card: #ffffff;
      --text: #0D0D2B;
      --subtext: #6B7280;
      --border: #E5E7EB;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--fond);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-x: hidden;
    }

    /* Background decoration */
    body::before {
      content: '';
      position: fixed;
      top: -200px;
      right: -200px;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(249,115,22,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -200px;
      left: -200px;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(13,13,43,0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    .container {
      width: 100%;
      max-width: 420px;
      animation: fadeUp 0.6s ease forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
      justify-content: center;
    }

    .logo {
      width: 44px;
      height: 44px;
      background: var(--nuit);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo svg {
      width: 22px;
      height: 22px;
      fill: var(--orange);
    }

    .logo-text {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--nuit);
      letter-spacing: -1px;
    }

    /* Card */
    .card {
      background: var(--card);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 4px 40px rgba(13,13,43,0.08), 0 1px 3px rgba(13,13,43,0.04);
      border: 1px solid var(--border);
    }

    .sender-info {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }

    .avatar {
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, var(--nuit), #1e1e6e);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }

    .sender-details h3 {
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 3px;
    }

    .sender-details p {
      font-size: 13px;
      color: var(--subtext);
    }

    .request-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(249,115,22,0.08);
      color: var(--orange);
      font-size: 12px;
      font-weight: 500;
      padding: 5px 10px;
      border-radius: 20px;
      margin-top: 6px;
    }

    /* Amount section */
    .amount-section {
      text-align: center;
      margin-bottom: 28px;
    }

    .amount-label {
      font-size: 13px;
      color: var(--subtext);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .amount-row {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0px;
      margin-bottom: 6px;
    }

    .amount-currency {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: var(--subtext);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .amount {
      font-family: 'Syne', sans-serif;
      font-size: 52px;
      font-weight: 800;
      color: var(--nuit);
      letter-spacing: -2px;
      line-height: 1;
    }

    .amount-eur {
      font-size: 14px;
      color: var(--subtext);
      margin-top: 4px;
    }

    /* Details */
    .details {
      background: var(--fond);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 24px;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }

    .detail-row:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .detail-row:first-child {
      padding-top: 0;
    }

    .detail-label {
      font-size: 13px;
      color: var(--subtext);
    }

    .detail-value {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
    }

    .operateur-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
    }

    .badge-tmoney {
      background: rgba(13,13,43,0.08);
      color: var(--nuit);
    }

    .badge-flooz {
      background: rgba(249,115,22,0.1);
      color: #854F0B;
    }

    /* Pay button */
    .btn-payer {
      width: 100%;
      height: 58px;
      background: var(--nuit);
      color: white;
      border: none;
      border-radius: 16px;
      font-family: 'Syne', sans-serif;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
      letter-spacing: 0.3px;
    }

    .btn-payer::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(135deg, transparent 0%, rgba(249,115,22,0.15) 100%);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .btn-payer:hover::before { opacity: 1; }
    .btn-payer:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(13,13,43,0.25); }
    .btn-payer:active { transform: translateY(0); }

    .btn-icon {
      width: 28px;
      height: 28px;
      background: var(--orange);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* App info */
    .app-info {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: var(--subtext);
      line-height: 1.6;
    }

    .app-info a {
      color: var(--orange);
      text-decoration: none;
      font-weight: 500;
    }

    /* Error state */
    .error-card {
      text-align: center;
      padding: 40px 20px;
    }

    .error-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .error-title {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
    }

    .error-text {
      font-size: 14px;
      color: var(--subtext);
    }

    /* Success state */
    .success-banner {
      display: none;
      background: linear-gradient(135deg, #E7F6EF, #D1FAE5);
      border: 1px solid #6EE7B7;
      border-radius: 14px;
      padding: 16px;
      text-align: center;
      margin-bottom: 16px;
      animation: fadeUp 0.4s ease;
    }

    .success-banner.show { display: block; }

    .success-banner p {
      font-size: 14px;
      color: var(--vert);
      font-weight: 500;
    }

    /* Footer */
    .footer {
      text-align: center;
      margin-top: 24px;
      font-size: 11px;
      color: var(--subtext);
      opacity: 0.6;
    }

    /* Pulse animation on button */
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(249,115,22,0.3); }
      50% { box-shadow: 0 0 0 12px rgba(249,115,22,0); }
    }

    .btn-payer.pulse { animation: pulse 2s infinite; }
  </style>
</head>
<body>

<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M5 17L12 5l7 12H5z"/></svg>
    </div>
    <span class="logo-text">haya</span>
  </div>

  <!-- Card -->
  <div class="card" id="mainCard">
    <!-- Contenu chargé dynamiquement -->
  </div>

  <div class="footer">Haya · Envoie. C'est parti. · haya.flexix.nl</div>

</div>

<script>
  // ─── Lire les paramètres de l'URL ───────────────────────────────
  const params = new URLSearchParams(window.location.search);
  const numero    = params.get('n') || '';
  const montant   = parseInt(params.get('m') || '0');
  const nom       = decodeURIComponent(params.get('nom') || 'Quelqu\'un');
  const objet     = decodeURIComponent(params.get('obj') || 'Paiement');
  const operateur = params.get('op') || 'tmoney'; // tmoney ou flooz
  const ref       = params.get('ref') || '';

  // ─── Calculs ──────────────────────────────────────────────────
  const tauxEuro = 655.957;
  const montantEur = (montant / tauxEuro).toFixed(2);
  const initiales = nom.split(' ').map(w => w[0]).join('').toUpperCase().substring(0, 2);
  const opNom = operateur === 'tmoney' ? 'Tmoney (Mixx by Yas)' : 'Flooz (Moov Africa)';
  const opBadge = operateur === 'tmoney' ? 'badge-tmoney' : 'badge-flooz';

  // ─── Formater montant ──────────────────────────────────────────
  function fmt(n) {
    return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
  }

  // ─── Rendu principal ──────────────────────────────────────────
  const card = document.getElementById('mainCard');

  if (!numero || !montant) {
    card.innerHTML = `
      <div class="error-card">
        <div class="error-icon">🔗</div>
        <div class="error-title">Lien invalide</div>
        <p class="error-text">Ce lien de paiement est incomplet ou expiré.</p>
      </div>`;
  } else {
    card.innerHTML = `
      <div id="successBanner" class="success-banner">
        <p>✅ Haya s'ouvre sur votre téléphone...</p>
      </div>

      <div class="sender-info">
        <div class="avatar">${initiales}</div>
        <div class="sender-details">
          <h3>${nom}</h3>
          <p>vous envoie une demande</p>
          <span class="request-label">
            <span>💳</span> Demande de paiement
          </span>
        </div>
      </div>

      <div class="amount-section">
        <div class="amount-label">Montant demandé</div>
        <div class="amount">FCFA ${fmt(montant)}</div>
        <div class="amount-eur">~${montantEur} EUR</div>
      </div>

      <div class="details">
        <div class="detail-row">
          <span class="detail-label">Objet</span>
          <span class="detail-value">${objet}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Numéro</span>
          <span class="detail-value">+228 ${numero}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Opérateur</span>
          <span class="operateur-badge ${opBadge}">${opNom}</span>
        </div>
        ${ref ? `<div class="detail-row">
          <span class="detail-label">Référence</span>
          <span class="detail-value">#${ref}</span>
        </div>` : ''}
      </div>

      <button class="btn-payer pulse" onclick="payer()">
        <div class="btn-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="white">
            <path d="M5 17L12 5l7 12H5z"/>
          </svg>
        </div>
        Payer avec Haya
      </button>

      <div class="app-info">
        Vous devez avoir <a href="https://play.google.com/store/apps/details?id=com.flexix.haya" target="_blank">Haya</a> installé sur votre téléphone.<br>
        Pas encore installé ? <a href="https://play.google.com/store/apps/details?id=com.flexix.haya" target="_blank">Télécharger gratuitement</a>
      </div>
    `;
  }

  // ─── Action payer ─────────────────────────────────────────────
  function payer() {
    // Deep link vers l'app Haya
    const deepLink = `haya://send?numero=${numero}&montant=${montant}&operateur=${operateur}&objet=${encodeURIComponent(objet)}`;

    // Afficher le banner succès
    const banner = document.getElementById('successBanner');
    if (banner) {
      banner.classList.add('show');
      setTimeout(() => banner.classList.remove('show'), 4000);
    }

    // Ouvrir le deep link
    window.location.href = deepLink;

    // Fallback : si l'app n'est pas installée, rediriger vers Play Store après 2 sec
    setTimeout(() => {
      if (document.visibilityState !== 'hidden') {
        window.location.href = 'https://play.google.com/store/apps/details?id=com.flexix.haya';
      }
    }, 2000);
  }
</script>

</body>
</html>
